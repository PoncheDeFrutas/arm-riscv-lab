project:
  type: website
  output-dir: _site
  post-render:
    - make slides-build
    - make nojekyll
  render:
    - "*.qmd"
    - "courses/**/*.qmd"
    - "guides/**/*.qmd"

website:
  title: "ARM RISC-V Lab"
  description: "Arquitectura de Computadores y Ensambladores con AArch64, QEMU, GDB y RISC-V."
  repo-url: https://github.com/PoncheDeFrutas/arm-riscv-lab
  page-navigation: true
  back-to-top-navigation: true
  search:
    location: navbar
    type: overlay
  navbar:
    title: "ARM RISC-V Lab"
    background: "#0b0f14"
    foreground: "#e5e7eb"
    pinned: true
    collapse: true
    left:
      - href: index.qmd
        text: Inicio
      - text: Cursos
        menu:
          - href: courses/aarch64/index.qmd
            text: Ruta AArch64
          - href: courses/riscv/index.qmd
            text: Ruta RISC-V
      - href: courses/aarch64/roadmap.qmd
        text: Roadmap
      - text: Guías
        menu:
          - href: guides/setup/index.qmd
            text: Setup
          - href: guides/setup/makefiles.qmd
            text: Makefiles
          - href: guides/debugging/qemu-vscode.qmd
            text: Debugging con QEMU
          - href: guides/debugging/native-vscode.qmd
            text: Debugging nativo ARM
          - href: guides/troubleshooting.qmd
            text: Troubleshooting
    tools:
      - icon: github
        href: https://github.com/PoncheDeFrutas/arm-riscv-lab
        text: GitHub
  sidebar:
    - title: "Curso AArch64"
      style: docked
      background: "#0b0f14"
      foreground: "#d1d5db"
      collapse-level: 2
      contents:
        - section: "AArch64"
          contents:
            - text: "Inicio del curso"
              href: courses/aarch64/index.qmd
            - text: "Roadmap"
              href: courses/aarch64/roadmap.qmd
            - text: "00 · Contexto, historia y objetivos"
              href: courses/aarch64/fundamentos/contexto-historia-objetivos.qmd
            - section: "01 · Laboratorio ARM64 reproducible"
              contents:
                - text: "Mapa de la unidad"
                  href: courses/aarch64/laboratorio/index.qmd
                - text: "Entorno Linux ARM64"
                  href: courses/aarch64/laboratorio/01-entorno-linux-arm64.qmd
                - text: "Instalación toolchain"
                  href: courses/aarch64/laboratorio/02-instalacion-toolchain.qmd
                - text: "Primer programa"
                  href: courses/aarch64/laboratorio/03-primer-programa.qmd
                - text: "Inspección del binario"
                  href: courses/aarch64/laboratorio/04-inspeccion-binario.qmd
                - text: "Debugging mínimo"
                  href: courses/aarch64/laboratorio/05-debugging-minimo.qmd
                - text: "Estructura del repositorio"
                  href: courses/aarch64/laboratorio/06-estructura-repositorio.qmd
            - section: "02 · Bases binarias y representación"
              contents:
                - text: "Mapa de la unidad"
                  href: courses/aarch64/bases-binarias/index.qmd
                - text: "Bits, bytes y bases"
                  href: courses/aarch64/bases-binarias/01-bits-bytes-bases.qmd
                - text: "Enteros, signo y rangos"
                  href: courses/aarch64/bases-binarias/02-enteros-signo-rangos.qmd
                - text: "Overflow y extensiones"
                  href: courses/aarch64/bases-binarias/03-overflow-extensiones.qmd
                - text: "Bytes y texto"
                  href: courses/aarch64/bases-binarias/04-bytes-texto.qmd
                - text: "Endianness y alineación"
                  href: courses/aarch64/bases-binarias/05-endianness-alineacion.qmd
                - text: "Direcciones y punteros"
                  href: courses/aarch64/bases-binarias/06-direcciones-punteros-memoria.qmd
            - section: "03 · Modelo ARMv8-A / AArch64"
              contents:
                - text: "Mapa de la unidad"
                  href: courses/aarch64/modelo-aarch64/index.qmd
                - text: "Registros generales"
                  href: courses/aarch64/modelo-aarch64/01-registros-generales.qmd
                - text: "Registros especiales"
                  href: courses/aarch64/modelo-aarch64/02-registros-especiales.qmd
                - text: "PSTATE y flags"
                  href: courses/aarch64/modelo-aarch64/03-pstate-flags.qmd
                - text: "SIMD/Floating Point"
                  href: courses/aarch64/modelo-aarch64/04-simd-floating-registers.qmd
                - text: "Exception levels"
                  href: courses/aarch64/modelo-aarch64/05-exception-levels.qmd
                - text: "Lectura con GDB"
                  href: courses/aarch64/modelo-aarch64/06-lectura-registros-gdb.qmd
    - title: "Curso RISC-V"
      style: docked
      background: "#0b0f14"
      foreground: "#d1d5db"
      collapse-level: 2
      contents:
        - section: "RISC-V"
          contents:
            - text: "Inicio del curso"
              href: courses/riscv/index.qmd
    - title: "Guías"
      style: docked
      background: "#0b0f14"
      foreground: "#d1d5db"
      collapse-level: 2
      contents:
        - section: "Entorno"
          contents:
            - guides/setup/index.qmd
            - guides/setup/qemu-x86_64.qmd
            - guides/setup/native-aarch64.qmd
            - guides/setup/makefiles.qmd
            - guides/setup/docker.qmd
        - section: "Debugging"
          contents:
            - guides/debugging/qemu-vscode.qmd
            - guides/debugging/native-vscode.qmd
        - section: "Troubleshooting"
          contents:
            - guides/troubleshooting.qmd
  page-footer:
    left: "ARM RISC-V Lab"
    center: "Arquitectura de Computadores y Ensambladores"
    right:
      - text: "GitHub"
        href: https://github.com/PoncheDeFrutas/arm-riscv-lab

format:
  html:
    theme:
      - default
      - assets/styles/site.scss
    highlight-style: breezedark
    toc: true
    toc-depth: 3
    toc-location: right
    code-copy: true
    code-tools: false
    code-overflow: wrap
    callout-appearance: simple
    link-external-icon: true
    anchor-sections: true
    lang: es
